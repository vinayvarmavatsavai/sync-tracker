<!-- file: project-timeline.html -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sync Tracker • Project Timeline</title>
  <link rel="stylesheet" href="styles.css" />

  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>
</head>
<body>
  <div class="topbar">
    <div class="row">
      <div class="brand">
        <div class="logo" aria-hidden="true"></div>
        <div>
          <h1>Sync Tracker</h1>
          <p>Project timeline</p>
        </div>
      </div>

      <div class="nav">
        <a class="btn" href="manager.html">Overview</a>
        <a class="btn" href="scrum-board.html">Scrum Board</a>
        <a class="btn" href="project-status.html">Project Status</a>
        <a class="btn" href="dashboard.html">Dashboard</a>
        <button class="btn danger" id="logoutBtn" type="button">Logout</button>
      </div>
    </div>
  </div>

  <div class="container" id="projectTimelinePage">
    <div class="grid two">
      <div class="card">
        <h2 id="timelineFormTitle">Add milestone</h2>
        <p class="small">Track deadlines, milestones, releases, sprints, and blockers.</p>

        <input type="hidden" id="milestoneId" />

        <div class="grid" style="margin-top:14px;">
          <div class="field">
            <label for="milestoneProject">Project</label>
            <select id="milestoneProject">
              <option value="">Select project</option>
            </select>
          </div>

          <div class="field">
            <label for="milestoneTitle">Title</label>
            <input id="milestoneTitle" type="text" placeholder="Ex: UI phase completed" />
          </div>

          <div class="grid two">
            <div class="field">
              <label for="milestoneDate">Date</label>
              <input id="milestoneDate" type="date" />
            </div>

            <div class="field">
              <label for="milestoneType">Type</label>
              <select id="milestoneType">
                <option>Milestone</option>
                <option>Deadline</option>
                <option>Sprint</option>
                <option>Release</option>
                <option>Blocker</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label for="milestoneStatus">Status</label>
            <select id="milestoneStatus">
              <option>Planned</option>
              <option selected>In Progress</option>
              <option>Done</option>
              <option>Delayed</option>
            </select>
          </div>

          <div class="field">
            <label for="milestoneDescription">Description</label>
            <textarea id="milestoneDescription" placeholder="Add milestone notes"></textarea>
          </div>

          <div class="actionRow">
            <button class="btn primary" id="milestoneSaveBtn" type="button">Save Milestone</button>
            <button class="btn ghost" id="milestoneCancelBtn" type="button" style="display:none;">Cancel Edit</button>
          </div>

          <div id="milestoneMsg" class="msg"></div>
        </div>
      </div>

      <div class="card">
        <h2>Timeline filters</h2>
        <p class="small">View all events or focus on one project.</p>

        <div class="grid" style="margin-top:14px;">
          <div class="field">
            <label for="timelineProjectFilter">Filter by project</label>
            <select id="timelineProjectFilter">
              <option value="__ALL__">All projects</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <div id="timelineList" class="grid" style="margin-top:16px;"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
